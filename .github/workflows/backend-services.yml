name: Build & Deploy Backend Services

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/services/**"
      - ".github/workflows/backend-services.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/services/**"

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      image-process: ${{ steps.changes.outputs.image-process }}
      image-predict: ${{ steps.changes.outputs.image-predict }}
      model-performance: ${{ steps.changes.outputs.model-performance }}
      app-route: ${{ steps.changes.outputs.app-route }}
      sync-actual: ${{ steps.changes.outputs.sync-actual }}
      backup-postgres: ${{ steps.changes.outputs.backup-postgres }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          # Detect changes in each service folder
          for service in image-process image-predict model-performance app-route sync-actual backup-postgres; do
            if git diff --name-only HEAD~1 HEAD | grep -q "backend/services/$service/"; then
              echo "$service=true" >> $GITHUB_OUTPUT
            else
              echo "$service=false" >> $GITHUB_OUTPUT
            fi
          done

  build-image-process:
    needs: detect-changes
    if: needs.detect-changes.outputs.image-process == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get and bump version
        id: version
        run: |
          # Determine repo based on branch
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            REPO_NAME="pro-repo"
          else
            REPO_NAME="dev-repo"
          fi

          SERVICE_NAME="image-process"

          # Get latest version from Docker Hub
          LATEST_VERSION=$(curl -s "https://registry.hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${REPO_NAME}/tags/?page_size=100" | \
            jq -r '.results[].name' | \
            grep "^${SERVICE_NAME}-v" | \
            sed 's/^'"${SERVICE_NAME}"'-v//' | \
            sort -V | \
            tail -1)

          if [ -z "$LATEST_VERSION" ]; then
            # No existing version, start with 1.0.0
            NEW_VERSION="v1.0.0"
          else
            # Parse and increment patch version
            IFS='.' read -r -a parts <<< "$LATEST_VERSION"
            MAJOR="${parts[0]}"
            MINOR="${parts[1]}"
            PATCH="${parts[2]}"
            
            PATCH=$((PATCH + 1))
            
            if [ $PATCH -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            
            if [ $MINOR -ge 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "repo=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services
          file: ./backend/services/image-process/Dockerfile
          push: true
          build-args: |
            MINIO_ENDPOINT_URL=http://minio.database.svc.cluster.local:9000
            MINIO_ACCESS_KEY=admin
            MINIO_SECRET_KEY=minhtan2003
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.version.outputs.repo }}:image-process-${{ steps.version.outputs.new }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.version.outputs.repo }}:image-process-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

