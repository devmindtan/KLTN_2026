<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>image-process</title>
  <desc>Loop 5min — init → per cycle → per camera → compute</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th { fill: #712B13; }
      .subgraph-label { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #CECBF6; } .ts { fill: #B4B2A9; } .arr { stroke: #888780; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; }
        .c-gray rect { fill: #444441; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; }
        .c-coral rect { fill: #712B13; stroke: #F0997B; } .c-coral .th { fill: #F5C4B3; }
        .subgraph-label { fill: #888780; }
      }
    </style>
  </defs>

  <!-- Root -->
  <g class="c-purple">
    <rect x="210" y="20" width="260" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">image-process</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">realtime</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

  <!-- Init -->
  <rect x="80" y="96" width="520" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="114" dominant-baseline="central">Init</text>
  <g class="c-teal"><rect x="100" y="124" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="174" y="142" text-anchor="middle" dominant-baseline="central">Load YOLO model</text></g>
  <g class="c-teal"><rect x="266" y="124" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Init S3 Client</text></g>
  <g class="c-teal"><rect x="432" y="124" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="506" y="142" text-anchor="middle" dominant-baseline="central">Init DB Pool</text></g>
  <line x1="340" y1="190" x2="340" y2="216" class="arr" marker-end="url(#arrow)"/>

  <!-- Per Cycle -->
  <rect x="140" y="216" width="400" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="158" y="234" dominant-baseline="central">Per Cycle</text>
  <g class="c-blue"><rect x="160" y="244" width="220" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="270" y="262" text-anchor="middle" dominant-baseline="central">refresh_capacity_map()</text></g>
  <line x1="380" y1="262" x2="410" y2="262" class="arr" marker-end="url(#arrow)"/>
  <g class="c-blue"><rect x="410" y="244" width="110" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="465" y="262" text-anchor="middle" dominant-baseline="central">20 cameras</text></g>
  <line x1="340" y1="310" x2="340" y2="338" class="arr" marker-end="url(#arrow)"/>

  <!-- Per Camera -->
  <rect x="80" y="338" width="520" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="356" dominant-baseline="central">Per Camera</text>
  <g class="c-coral"><rect x="100" y="366" width="90" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="145" y="384" text-anchor="middle" dominant-baseline="central">Fetch image</text></g>
  <line x1="190" y1="384" x2="208" y2="384" class="arr" marker-end="url(#arrow)"/>
  <g class="c-coral"><rect x="208" y="366" width="96" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="256" y="384" text-anchor="middle" dominant-baseline="central">YOLO detect</text></g>
  <line x1="304" y1="384" x2="322" y2="384" class="arr" marker-end="url(#arrow)"/>
  <g class="c-coral"><rect x="322" y="366" width="104" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="374" y="384" text-anchor="middle" dominant-baseline="central">Count objects</text></g>
  <line x1="426" y1="384" x2="444" y2="384" class="arr" marker-end="url(#arrow)"/>
  <g class="c-coral"><rect x="444" y="366" width="94" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="491" y="384" text-anchor="middle" dominant-baseline="central">Save to DB</text></g>
  <line x1="340" y1="432" x2="340" y2="458" class="arr" marker-end="url(#arrow)"/>

  <!-- Compute -->
  <rect x="140" y="458" width="400" height="84" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="158" y="476" dominant-baseline="central">Compute</text>
  <g class="c-gray"><rect x="160" y="486" width="172" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="246" y="504" text-anchor="middle" dominant-baseline="central">LOS = objects/capacity</text></g>
  <g class="c-gray"><rect x="348" y="486" width="172" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="434" y="504" text-anchor="middle" dominant-baseline="central">Update FIWARE</text></g>
</svg>