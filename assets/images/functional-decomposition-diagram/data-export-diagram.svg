<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>data-export</title>
  <desc>CronJob 01:00 UTC — query → export to MinIO → update metadata</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .subgraph-label { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #CECBF6; } .ts { fill: #B4B2A9; } .arr { stroke: #888780; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; }
        .c-gray rect { fill: #444441; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; }
        .c-amber rect { fill: #633806; stroke: #EF9F27; } .c-amber .th { fill: #FAC775; }
        .subgraph-label { fill: #888780; }
      }
    </style>
  </defs>

  <!-- Root -->
  <g class="c-purple">
    <rect x="180" y="20" width="320" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">data-export</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">CronJob — 01:00 UTC</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

  <!-- Validate -->
  <g class="c-gray"><rect x="160" y="96" width="360" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="114" text-anchor="middle" dominant-baseline="central">Validate date range (D-1: 00:00→24:00 UTC)</text></g>
  <line x1="340" y1="132" x2="340" y2="158" class="arr" marker-end="url(#arrow)"/>

  <!-- Query Data -->
  <rect x="140" y="158" width="400" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="158" y="176" dominant-baseline="central">Query Data</text>
  <g class="c-teal"><rect x="160" y="186" width="172" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="246" y="204" text-anchor="middle" dominant-baseline="central">query_detections()</text></g>
  <g class="c-teal"><rect x="348" y="186" width="172" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="434" y="204" text-anchor="middle" dominant-baseline="central">query_forecasts()</text></g>
  <line x1="340" y1="252" x2="340" y2="278" class="arr" marker-end="url(#arrow)"/>

  <!-- Export to MinIO -->
  <rect x="80" y="278" width="520" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="296" dominant-baseline="central">Export to MinIO</text>
  <g class="c-blue"><rect x="100" y="306" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="174" y="324" text-anchor="middle" dominant-baseline="central">export_detections()</text></g>
  <g class="c-blue"><rect x="266" y="306" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="324" text-anchor="middle" dominant-baseline="central">export_forecasts()</text></g>
  <g class="c-blue"><rect x="432" y="306" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="506" y="324" text-anchor="middle" dominant-baseline="central">export_summary()</text></g>
  <line x1="340" y1="372" x2="340" y2="398" class="arr" marker-end="url(#arrow)"/>

  <!-- Update Metadata -->
  <rect x="160" y="398" width="360" height="84" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="178" y="416" dominant-baseline="central">Update Metadata</text>
  <g class="c-amber"><rect x="180" y="426" width="152" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="256" y="444" text-anchor="middle" dominant-baseline="central">upsert_collection()</text></g>
  <line x1="332" y1="444" x2="360" y2="444" class="arr" marker-end="url(#arrow)"/>
  <g class="c-amber"><rect x="360" y="426" width="140" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="430" y="444" text-anchor="middle" dominant-baseline="central">insert_entry()</text></g>
</svg>