<svg width="100%" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>backup-postgres</title>
  <desc>CronJob pipeline: init → dump → upload → cleanup → complete</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th { fill: #27500A; }
      .subgraph-label { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #CECBF6; } .ts { fill: #B4B2A9; } .arr { stroke: #888780; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; }
        .c-amber rect { fill: #633806; stroke: #EF9F27; } .c-amber .th { fill: #FAC775; }
        .c-green rect { fill: #27500A; stroke: #97C459; } .c-green .th { fill: #C0DD97; }
        .subgraph-label { fill: #888780; }
      }
    </style>
  </defs>

  <!-- Root -->
  <g class="c-purple">
    <rect x="210" y="20" width="260" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">backup-postgres</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">CronJob</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

  <!-- Init -->
  <rect x="180" y="96" width="320" height="106" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="198" y="114" dominant-baseline="central">Init</text>
  <g class="c-teal"><rect x="200" y="122" width="280" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">log_backup_start()</text></g>
  <line x1="340" y1="158" x2="340" y2="174" class="arr" marker-end="url(#arrow)"/>
  <g class="c-teal"><rect x="200" y="174" width="280" height="24" rx="6" stroke-width="0.5"/>
    <text class="ts" x="340" y="186" text-anchor="middle" dominant-baseline="central">Insert 'running' status</text></g>
  <line x1="340" y1="202" x2="340" y2="226" class="arr" marker-end="url(#arrow)"/>

  <!-- Dump -->
  <rect x="140" y="226" width="400" height="128" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="158" y="244" dominant-baseline="central">Database Dump</text>
  <g class="c-blue"><rect x="160" y="254" width="360" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="272" text-anchor="middle" dominant-baseline="central">run_pg_dump()</text></g>
  <line x1="340" y1="290" x2="340" y2="308" class="arr" marker-end="url(#arrow)"/>
  <g class="c-blue"><rect x="160" y="308" width="168" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="244" y="326" text-anchor="middle" dominant-baseline="central">Format: custom (-Fc)</text></g>
  <line x1="328" y1="326" x2="352" y2="326" class="arr" marker-end="url(#arrow)"/>
  <g class="c-blue"><rect x="352" y="308" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="426" y="326" text-anchor="middle" dominant-baseline="central">Built-in compression</text></g>
  <line x1="340" y1="354" x2="340" y2="378" class="arr" marker-end="url(#arrow)"/>

  <!-- Upload -->
  <rect x="180" y="378" width="320" height="106" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="198" y="396" dominant-baseline="central">Upload</text>
  <g class="c-amber"><rect x="200" y="404" width="280" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="422" text-anchor="middle" dominant-baseline="central">upload_to_gdrive()</text></g>
  <line x1="340" y1="440" x2="340" y2="458" class="arr" marker-end="url(#arrow)"/>
  <g class="c-amber"><rect x="200" y="458" width="280" height="24" rx="6" stroke-width="0.5"/>
    <text class="ts" x="340" y="470" text-anchor="middle" dominant-baseline="central">via rclone</text></g>
  <line x1="340" y1="484" x2="340" y2="508" class="arr" marker-end="url(#arrow)"/>

  <!-- Cleanup + Complete -->
  <rect x="100" y="508" width="480" height="18" rx="6" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts subgraph-label" x="340" y="517" text-anchor="middle" dominant-baseline="central">cleanup_local_backup()  →  log_backup_complete()</text>
</svg>