    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #f8f7f4;
        padding: 32px 24px;
        color: #2c2c2a;
      }
      h1 {
        font-size: 20px;
        font-weight: 500;
        margin-bottom: 32px;
        color: #2c2c2a;
        letter-spacing: -0.3px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
        gap: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #e0ded6;
        border-radius: 12px;
        padding: 24px;
      }
      .card-title {
        font-size: 13px;
        font-weight: 500;
        color: #888780;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #f0ede6;
      }

      /* Shared SVG styles */
      svg {
        font-family: sans-serif;
        overflow: visible;
      }
      .th {
        font-size: 14px;
        font-weight: 500;
        fill: #3c3489;
      }
      .ts {
        font-size: 12px;
        font-weight: 400;
        fill: #5f5e5a;
      }
      .arr {
        stroke: #888780;
        stroke-width: 1.5;
        fill: none;
      }

      .c-purple rect {
        fill: #eeedfe;
        stroke: #534ab7;
      }
      .c-purple .th {
        fill: #3c3489;
      }
      .c-purple .ts {
        fill: #534ab7;
      }

      .c-teal rect {
        fill: #e1f5ee;
        stroke: #0f6e56;
      }
      .c-teal .th {
        fill: #085041;
      }

      .c-blue rect {
        fill: #e6f1fb;
        stroke: #185fa5;
      }
      .c-blue .th {
        fill: #0c447c;
      }

      .c-gray rect {
        fill: #f1efe8;
        stroke: #5f5e5a;
      }
      .c-gray .th {
        fill: #444441;
      }

      .c-amber rect {
        fill: #faeeda;
        stroke: #854f0b;
      }
      .c-amber .th {
        fill: #633806;
      }

      .c-green rect {
        fill: #eaf3de;
        stroke: #3b6d11;
      }
      .c-green .th {
        fill: #27500a;
      }

      .c-coral rect {
        fill: #faece7;
        stroke: #993c1d;
      }
      .c-coral .th {
        fill: #712b13;
      }

      .c-pink rect {
        fill: #fbeaf0;
        stroke: #993556;
      }
      .c-pink .th {
        fill: #72243e;
      }

      .subgraph-label {
        fill: #5f5e5a;
      }
      .dashed-arrow {
        stroke: #b4b2a9;
      }
      .branch-label {
        font-size: 11px;
        fill: #888780;
      }

      /* decision diamond */
      .diamond {
        fill: #fff8ec;
        stroke: #854f0b;
        stroke-width: 0.5;
      }
      .diamond-text {
        font-size: 12px;
        font-weight: 500;
        fill: #633806;
      }
