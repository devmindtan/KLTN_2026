name: Build & Deploy Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get and bump version
        id: version
        run: |
          # Determine repo based on branch
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            REPO_NAME="pro-repo"
          else
            REPO_NAME="dev-repo"
          fi

          SERVICE_NAME="frontend"

          # Get latest version from Docker Hub
          LATEST_VERSION=$(curl -s "https://registry.hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${REPO_NAME}/tags/?page_size=100" | \
            jq -r '.results[].name' | \
            grep "^${SERVICE_NAME}-v" | \
            sed 's/^'"${SERVICE_NAME}"'-v//' | \
            sort -V | \
            tail -1)

          if [ -z "$LATEST_VERSION" ]; then
            NEW_VERSION="v1.0.0"
          else
            IFS='.' read -r -a parts <<< "$LATEST_VERSION"
            MAJOR="${parts[0]}"
            MINOR="${parts[1]}"
            PATCH="${parts[2]}"
            
            PATCH=$((PATCH + 1))
            
            if [ $PATCH -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            
            if [ $MINOR -ge 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "repo=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
            VITE_MINIO_URL=${{ secrets.VITE_MINIO_URL }}
            VITE_LOG=false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.version.outputs.repo }}:frontend-${{ steps.version.outputs.new }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.version.outputs.repo }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
