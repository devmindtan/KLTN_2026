name: Build & Deploy Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - "web/web-user/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/web-user/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get and bump version
        id: version
        run: |
          # Determine version file and repo based on branch
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            VERSION_FILE="web/web-user/VERSION.prod"
            REPO_NAME="pro-repo"
          else
            VERSION_FILE="web/web-user/VERSION.dev"
            REPO_NAME="dev-repo"
          fi

          CURRENT_VERSION=$(cat $VERSION_FILE)
          chmod +x .github/scripts/version-bump.sh
          NEW_VERSION=$(.github/scripts/version-bump.sh $VERSION_FILE)
          echo "new=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "repo=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "version_file=$VERSION_FILE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./web/web-user
          file: ./web/web-user/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.version.outputs.repo }}:frontend-${{ steps.version.outputs.new }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.version.outputs.repo }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.version.outputs.version_file }}
          git commit -m "chore: bump frontend version to ${{ steps.version.outputs.new }}" || echo "No changes"
          git push || echo "Push failed"
