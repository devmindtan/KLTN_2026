<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>sync-actual</title>
  <desc>CronJob delay +2-3min — define window → sync → aggregate → validate → update or skip</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th { fill: #27500A; }
      .branch-label { font-size: 11px; fill: #888780; }
      .subgraph-label { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #CECBF6; } .ts { fill: #B4B2A9; } .arr { stroke: #888780; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; }
        .c-gray rect { fill: #444441; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; }
        .c-amber rect { fill: #633806; stroke: #EF9F27; } .c-amber .th { fill: #FAC775; }
        .c-green rect { fill: #27500A; stroke: #97C459; } .c-green .th { fill: #C0DD97; }
        .branch-label { fill: #888780; }
        .subgraph-label { fill: #888780; }
      }
    </style>
  </defs>

  <!-- Root -->
  <g class="c-purple">
    <rect x="140" y="20" width="400" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">sync-actual</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">CronJob delay +2-3min</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

  <!-- Define window -->
  <g class="c-gray"><rect x="160" y="90" width="360" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">Define window: 5h lookback</text></g>
  <line x1="340" y1="126" x2="340" y2="148" class="arr" marker-end="url(#arrow)"/>

  <!-- sync_actual_values -->
  <g class="c-blue"><rect x="160" y="148" width="360" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="166" text-anchor="middle" dominant-baseline="central">sync_actual_values()</text></g>
  <line x1="340" y1="184" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>

  <!-- Aggregate -->
  <rect x="80" y="208" width="520" height="124" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="226" dominant-baseline="central">Aggregate</text>
  <g class="c-teal"><rect x="100" y="236" width="220" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="210" y="254" text-anchor="middle" dominant-baseline="central">Query camera_detections</text></g>
  <line x1="320" y1="254" x2="350" y2="254" class="arr" marker-end="url(#arrow)"/>
  <g class="c-teal"><rect x="350" y="236" width="230" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="465" y="254" text-anchor="middle" dominant-baseline="central">Per 5-min bucket</text></g>
  <line x1="210" y1="272" x2="210" y2="290" class="arr" marker-end="url(#arrow)"/>
  <g class="c-teal"><rect x="100" y="290" width="220" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="210" y="308" text-anchor="middle" dominant-baseline="central">Calc real_avg</text></g>
  <line x1="320" y1="308" x2="350" y2="308" class="arr" marker-end="url(#arrow)"/>
  <g class="c-teal"><rect x="350" y="290" width="230" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="465" y="308" text-anchor="middle" dominant-baseline="central">Calc sample_count</text></g>
  <line x1="340" y1="332" x2="340" y2="358" class="arr" marker-end="url(#arrow)"/>

  <!-- Validate -->
  <rect x="140" y="358" width="400" height="84" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="158" y="376" dominant-baseline="central">Validate</text>
  <g class="c-amber"><rect x="160" y="386" width="172" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="246" y="404" text-anchor="middle" dominant-baseline="central">Bucket complete?</text></g>
  <line x1="332" y1="404" x2="362" y2="404" class="arr" marker-end="url(#arrow)"/>
  <g class="c-amber"><rect x="362" y="386" width="158" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="441" y="398" text-anchor="middle" dominant-baseline="central">forecast_for_time ≤</text>
    <text class="ts" x="441" y="414" text-anchor="middle" dominant-baseline="central">NOW - 5 min</text></g>

  <!-- Yes → Update -->
  <line x1="246" y1="422" x2="246" y2="456" class="arr" marker-end="url(#arrow)"/>
  <text class="branch-label" x="252" y="437">Yes</text>
  <rect x="80" y="456" width="350" height="72" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="474" dominant-baseline="central">Update</text>
  <g class="c-green"><rect x="100" y="484" width="96" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="148" y="502" text-anchor="middle" dominant-baseline="central">actual_value</text></g>
  <g class="c-green"><rect x="206" y="484" width="104" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="258" y="502" text-anchor="middle" dominant-baseline="central">sample_count</text></g>
  <g class="c-green"><rect x="320" y="484" width="96" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="368" y="502" text-anchor="middle" dominant-baseline="central">error_value</text></g>

  <!-- No → Skip -->
  <line x1="540" y1="404" x2="590" y2="404" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="590" y1="404" x2="590" y2="456" class="arr" marker-end="url(#arrow)"/>
  <text class="branch-label" x="545" y="396">No</text>
  <g class="c-gray"><rect x="548" y="456" width="110" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="603" y="474" text-anchor="middle" dominant-baseline="central">Skip bucket</text></g>
</svg>