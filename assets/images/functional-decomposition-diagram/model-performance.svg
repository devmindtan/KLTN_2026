<svg width="100%" viewBox="0 0 680 510" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>model-performance</title>
  <desc>CronJob 07:00 UTC — analysis → metrics → confidence → persist → FIWARE</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th { fill: #27500A; }
      .subgraph-label { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #CECBF6; } .ts { fill: #B4B2A9; } .arr { stroke: #888780; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; }
        .c-gray rect { fill: #444441; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; }
        .c-amber rect { fill: #633806; stroke: #EF9F27; } .c-amber .th { fill: #FAC775; }
        .c-green rect { fill: #27500A; stroke: #97C459; } .c-green .th { fill: #C0DD97; }
        .subgraph-label { fill: #888780; }
      }
    </style>
  </defs>

  <!-- Root -->
  <g class="c-purple">
    <rect x="160" y="20" width="360" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">model-performance</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">CronJob 07:00 UTC</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

  <!-- Analysis -->
  <rect x="140" y="96" width="400" height="106" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="158" y="114" dominant-baseline="central">Analysis</text>
  <g class="c-teal"><rect x="160" y="124" width="360" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Query camera_forecasts</text></g>
  <line x1="340" y1="160" x2="340" y2="178" class="arr" marker-end="url(#arrow)"/>
  <g class="c-teal"><rect x="160" y="178" width="360" height="20" rx="6" stroke-width="0.5"/>
    <text class="ts" x="340" y="188" text-anchor="middle" dominant-baseline="central">with actual_value</text></g>
  <line x1="340" y1="202" x2="340" y2="226" class="arr" marker-end="url(#arrow)"/>

  <!-- Calculate Metrics -->
  <rect x="80" y="226" width="520" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="244" dominant-baseline="central">Calculate Metrics</text>
  <g class="c-blue"><rect x="100" y="254" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="174" y="272" text-anchor="middle" dominant-baseline="central">Overall: MAE, MAPE</text></g>
  <g class="c-blue"><rect x="266" y="254" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="272" text-anchor="middle" dominant-baseline="central">By Horizon (5m–60m)</text></g>
  <g class="c-blue"><rect x="432" y="254" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="506" y="272" text-anchor="middle" dominant-baseline="central">By Camera</text></g>
  <line x1="340" y1="320" x2="340" y2="346" class="arr" marker-end="url(#arrow)"/>

  <!-- Confidence -->
  <rect x="160" y="346" width="360" height="84" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="178" y="364" dominant-baseline="central">Confidence</text>
  <g class="c-amber"><rect x="180" y="374" width="152" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="256" y="392" text-anchor="middle" dominant-baseline="central">Input sample count</text></g>
  <line x1="332" y1="392" x2="360" y2="392" class="arr" marker-end="url(#arrow)"/>
  <g class="c-amber"><rect x="360" y="374" width="140" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="430" y="392" text-anchor="middle" dominant-baseline="central">LAG sample count</text></g>
  <line x1="340" y1="430" x2="340" y2="454" class="arr" marker-end="url(#arrow)"/>

  <!-- Persist + FIWARE -->
  <g class="c-gray"><rect x="140" y="454" width="200" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="240" y="472" text-anchor="middle" dominant-baseline="central">save_metrics_to_db()</text></g>
  <line x1="340" y1="472" x2="362" y2="472" class="arr" marker-end="url(#arrow)"/>
  <g class="c-green"><rect x="362" y="454" width="178" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="451" y="472" text-anchor="middle" dominant-baseline="central">Update FIWARE</text></g>
</svg>