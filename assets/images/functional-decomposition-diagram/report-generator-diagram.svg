<svg width="100%" viewBox="0 0 680 590" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>report-generator</title>
  <desc>On-demand — load config → decision → standard or chunked → analytics → export → finalize</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th { fill: #712B13; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th { fill: #27500A; }
      .diamond { fill: #FFF8EC; stroke: #854F0B; stroke-width: 0.5; }
      .diamond-text { font-size: 12px; font-weight: 500; fill: #633806; }
      .branch-label { font-size: 11px; fill: #888780; }
      .subgraph-label { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #CECBF6; } .ts { fill: #B4B2A9; } .arr { stroke: #888780; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; }
        .c-gray rect { fill: #444441; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; }
        .c-amber rect { fill: #633806; stroke: #EF9F27; } .c-amber .th { fill: #FAC775; }
        .c-coral rect { fill: #712B13; stroke: #F0997B; } .c-coral .th { fill: #F5C4B3; }
        .c-green rect { fill: #27500A; stroke: #97C459; } .c-green .th { fill: #C0DD97; }
        .diamond { fill: #412402; stroke: #EF9F27; }
        .diamond-text { fill: #FAC775; }
        .branch-label { fill: #888780; }
        .subgraph-label { fill: #888780; }
      }
    </style>
  </defs>

  <!-- Root -->
  <g class="c-purple">
    <rect x="200" y="20" width="280" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">report-generator</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">On-demand</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

  <!-- Load config -->
  <g class="c-gray"><rect x="200" y="90" width="280" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">Load report config</text></g>
  <line x1="340" y1="126" x2="340" y2="150" class="arr" marker-end="url(#arrow)"/>

  <!-- Diamond decision -->
  <polygon class="diamond" points="340,150 406,180 340,210 274,180"/>
  <text class="diamond-text" x="340" y="175" text-anchor="middle" dominant-baseline="central">Duration</text>
  <text class="diamond-text" x="340" y="191" text-anchor="middle" dominant-baseline="central">&gt; 1 day?</text>

  <!-- No → Standard (left) -->
  <line x1="274" y1="180" x2="160" y2="180" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="160" y1="180" x2="160" y2="220" class="arr" marker-end="url(#arrow)"/>
  <text class="branch-label" x="200" y="172">No</text>
  <rect x="60" y="220" width="200" height="72" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="78" y="238" dominant-baseline="central">Standard (≤1 day)</text>
  <g class="c-teal"><rect x="78" y="246" width="164" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="160" y="264" text-anchor="middle" dominant-baseline="central">_collect_traffic_data()</text></g>

  <!-- Yes → Chunked (right) -->
  <line x1="406" y1="180" x2="520" y2="180" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="520" y1="180" x2="520" y2="220" class="arr" marker-end="url(#arrow)"/>
  <text class="branch-label" x="450" y="172">Yes</text>
  <rect x="420" y="220" width="200" height="72" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="438" y="238" dominant-baseline="central">Chunked (&gt;1 day)</text>
  <g class="c-blue"><rect x="438" y="246" width="164" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="520" y="264" text-anchor="middle" dominant-baseline="central">_generate_chunked()</text></g>

  <!-- Both branches → Analytics -->
  <line x1="160" y1="292" x2="160" y2="322" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="160" y1="322" x2="340" y2="322" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="520" y1="292" x2="520" y2="322" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="340" y1="322" x2="520" y2="322" stroke="#888780" stroke-width="1.5" fill="none"/>
  <line x1="340" y1="322" x2="340" y2="344" class="arr" marker-end="url(#arrow)"/>

  <!-- Analytics -->
  <rect x="80" y="344" width="520" height="94" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="98" y="362" dominant-baseline="central">Analytics</text>
  <g class="c-amber"><rect x="100" y="372" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="174" y="390" text-anchor="middle" dominant-baseline="central">analyze_traffic_data()</text></g>
  <g class="c-amber"><rect x="266" y="372" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="390" text-anchor="middle" dominant-baseline="central">LOS breakdown</text></g>
  <g class="c-amber"><rect x="432" y="372" width="148" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="506" y="390" text-anchor="middle" dominant-baseline="central">Forecast vs actual</text></g>
  <line x1="340" y1="438" x2="340" y2="462" class="arr" marker-end="url(#arrow)"/>

  <!-- Export Files -->
  <rect x="120" y="462" width="440" height="72" rx="10" fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts subgraph-label" x="138" y="480" dominant-baseline="central">Export Files</text>
  <g class="c-coral"><rect x="140" y="490" width="190" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="235" y="508" text-anchor="middle" dominant-baseline="central">create_executive_pdf()</text></g>
  <g class="c-coral"><rect x="350" y="490" width="190" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="445" y="508" text-anchor="middle" dominant-baseline="central">create_data_xlsx()</text></g>
  <line x1="340" y1="534" x2="340" y2="556" class="arr" marker-end="url(#arrow)"/>

  <!-- Finalize -->
  <g class="c-green"><rect x="180" y="556" width="320" height="22" rx="6" stroke-width="0.5"/>
    <text class="ts" x="340" y="567" text-anchor="middle" dominant-baseline="central">Upload MinIO → Update report status</text></g>
</svg>